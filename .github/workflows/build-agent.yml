name: Build desktop agent

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/build-agent.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # .env is gitignored on purpose (it's not a secret, but keeping the
      # pattern consistent) — recreate it here from repo secrets.
      - name: Write .env
        shell: bash
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: desk-tracker-${{ matrix.os }}
          path: |
            agent/release/*.exe
            agent/release/*.dmg
          if-no-files-found: error
